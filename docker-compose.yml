services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: finflow
      POSTGRES_USER: finflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    networks:
      - internal


  neo4j:
    image: neo4j:5.20.0-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_dbms_security_procedures_unrestricted: "gds.*"
      NEO4J_dbms_security_procedures_allowlist: "gds.*"
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "1G"
    volumes:
      - neo4j_data:/data
      - ./plugins:/plugins
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 20s
      timeout: 10s
      retries: 5
    security_opt:
      - no-new-privileges:true
    networks:
      - internal


  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # volatile-lru: evicts ONLY keys WITH a TTL.
    # Celery task result keys have NO TTL — they are never evicted under memory pressure.
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy volatile-lru
    volumes:
      - redis_data:/data
    security_opt:
      - no-new-privileges:true
    networks:
      - internal


  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      PYTHONPATH: /app
      DATABASE_URL: postgresql+asyncpg://finflow:${POSTGRES_PASSWORD}@postgres:5432/finflow
      NEO4J_URL: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      REDIS_URL: redis://redis:6379/0
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
      LLM_MODEL: ${LLM_MODEL:-llama-3.1-8b-instant}
      GROQ_API_KEY: ${GROQ_API_KEY}
      TSA_URL: ${TSA_URL:-https://freetsa.org/tsr}
      SECRET_KEY: ${SECRET_KEY}
      UPLOAD_DIR: /data/uploads
      REPORT_DIR: /data/reports
      MODEL_DIR: /app/models
    volumes:
      - uploads:/data/uploads
      - reports:/data/reports
      - ./models:/app/models
    networks:
      - internal
      - external
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
      - redis
    environment:
      PYTHONPATH: /app
      DATABASE_URL: postgresql+asyncpg://finflow:${POSTGRES_PASSWORD}@postgres:5432/finflow
      NEO4J_URL: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      REDIS_URL: redis://redis:6379/0
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
      LLM_MODEL: ${LLM_MODEL:-llama-3.1-8b-instant}
      GROQ_API_KEY: ${GROQ_API_KEY}
      UPLOAD_DIR: /data/uploads
      REPORT_DIR: /data/reports
      MODEL_DIR: /app/models
    volumes:
      - uploads:/data/uploads
      - reports:/data/reports
      - ./models:/app/models
    networks:
      - internal
    security_opt:
      - no-new-privileges:true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - external

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "3000:443"   # HTTPS — access via https://localhost:3000
      - "3080:80"    # HTTP — redirects to HTTPS only
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    networks:
      - external
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:
  neo4j_data:
  redis_data:
  uploads:
  reports:

networks:
  internal:
    driver: bridge
  external:
    driver: bridge
