events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Brute-force protection: 5 auth requests per minute per IP
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

    client_max_body_size 50m;
    proxy_read_timeout   300s;
    proxy_connect_timeout 10s;
    proxy_send_timeout   300s;

    upstream backend  { server backend:8000; }
    upstream frontend { server frontend:3000; }

    # HTTP serves ONLY a redirect to HTTPS — no application content over HTTP
    server {
        listen 80;
        server_name _;
        return 301 https://$host:3000$request_uri;
    }

    # All application traffic over HTTPS
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5:!RC4;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security response headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "DENY" always;
        add_header Referrer-Policy           "no-referrer" always;
        add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; img-src 'self' data:; style-src 'self' 'unsafe-inline';" always;

        # Rate-limited auth routes
        location /auth/ {
            limit_req zone=auth_limit burst=3 nodelay;
            limit_req_status 429;
            proxy_pass http://backend/auth/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API routes
        location /api/ {
            proxy_pass http://backend/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket — JWT token passed as ?token= query param (RULE 11)
        location /ws/ {
            proxy_pass http://backend/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_read_timeout 3600s;
        }

        # React SPA
        location / {
            proxy_pass http://frontend/;
            proxy_set_header Host              $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            error_page 404 = /index.html;
        }
    }
}
